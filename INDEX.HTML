<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HerreriaPRO ☁️ 3D</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <style>
        :root{--bg:#1a1a1a;--card:#252525;--border:#333;--orange:#f97316;--text:#e0e0e0;--text2:#888;--danger:#ef4444;--success:#10b981}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        body{background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;overflow:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        
        .sidebar{width:60px;background:#111;padding:0.5rem 0.2rem;display:flex;flex-direction:column;gap:0.2rem;border-right:2px solid var(--border);flex-shrink:0;align-items:center}
        .logo{font-size:0.9rem;font-weight:800;color:var(--orange);margin-bottom:0.8rem;display:none}
        .nav-item{padding:0.5rem;border-radius:10px;cursor:pointer;color:#999;font-size:0.6rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.15rem;width:100%;transition:0.2s}
        .nav-icon{font-size:1.1rem}
        .nav-item.active{background:var(--orange);color:#000;font-weight:700}
        .nav-item:active{transform:scale(0.95)}
        
        .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid var(--border);z-index:100;padding:0.2rem 0 env(safe-area-inset-bottom,0.4rem)}
        .bn-inner{display:flex;justify-content:space-around}
        .bn-item{display:flex;flex-direction:column;align-items:center;gap:0.1rem;padding:0.35rem;color:#999;cursor:pointer;font-size:0.55rem;border-radius:8px;border:none;background:none}
        .bn-item.active{color:var(--orange);font-weight:700}
        .bn-icon{font-size:1.2rem}
        
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .topbar{background:#111;padding:0 0.8rem;height:45px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
        .topbar h1{font-size:clamp(0.85rem,2vw,1.1rem);color:var(--orange)}
        .topbar-right{display:flex;align-items:center;gap:0.4rem}
        .dot{width:6px;height:6px;border-radius:50%}
        .dot.on{background:var(--success)}
        .dot.off{background:var(--danger)}
        .dot.sync{background:#fbbf24;animation:spin 1.5s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .content{flex:1;overflow-y:auto;padding:0.6rem;-webkit-overflow-scrolling:touch}
        .page{display:none}
        .page.active{display:block}
        
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:0.4rem;margin-bottom:0.8rem}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.6rem;text-align:center}
        .stat-card .num{font-size:clamp(1rem,2.5vw,1.5rem);font-weight:800;color:var(--orange)}
        .stat-card .lbl{font-size:0.55rem;color:var(--text2);text-transform:uppercase;margin-top:0.15rem}
        
        .alert-list{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.6rem}
        .alert-list h3{color:var(--orange);font-size:0.75rem;margin-bottom:0.4rem}
        .alert-item{display:flex;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid var(--border);font-size:0.7rem;gap:0.4rem}
        .badge{padding:0.15rem 0.35rem;border-radius:8px;font-size:0.55rem;font-weight:700}
        .badge.warn{background:#7c2d12;color:#fdba74}
        .badge.danger{background:#450a0a;color:#fca5a5}
        .badge.ok{background:#065f46;color:#6ee7b7}
        
        .table-wrap{overflow-x:auto;border-radius:8px;background:var(--card);border:1px solid var(--border)}
        table{width:100%;min-width:450px;border-collapse:collapse;font-size:0.7rem}
        th{background:#0a0a0a;color:var(--orange);font-size:0.6rem;text-transform:uppercase;padding:0.4rem;text-align:left}
        td{padding:0.4rem;border-bottom:1px solid var(--border);white-space:nowrap}
        td:first-child{white-space:normal;min-width:100px}
        
        .btn{background:var(--orange);color:#000;border:none;padding:0.4rem 0.7rem;border-radius:6px;font-weight:700;cursor:pointer;font-size:0.7rem;min-height:30px;transition:0.2s}
        .btn:active{transform:scale(0.95)}
        .btn-outline{background:transparent;border:1px solid var(--orange);color:var(--orange);padding:0.4rem 0.7rem;border-radius:6px;cursor:pointer;font-size:0.7rem;min-height:30px}
        .btn-sm{padding:0.25rem 0.4rem;font-size:0.6rem;min-height:24px}
        .btn-3d{background:#3b82f6;color:#fff;border:none;font-size:0.9rem;padding:0.2rem 0.4rem;border-radius:4px;cursor:pointer}
        
        .inv-header{display:flex;gap:0.3rem;margin-bottom:0.6rem;flex-wrap:wrap}
        .inv-header input{flex:1;padding:0.4rem;background:var(--card);border:1px solid var(--border);border-radius:6px;color:#fff;font-size:0.8rem;min-width:100px}
        .inv-header select{padding:0.4rem;background:var(--card);border:1px solid var(--border);border-radius:6px;color:#fff;font-size:0.7rem}
        
        .asistente-layout{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;height:calc(100vh - 100px)}
        .panel{background:var(--card);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden}
        .panel h3{color:var(--orange);padding:0.5rem 0.6rem;border-bottom:1px solid var(--border);font-size:0.75rem;display:flex;justify-content:space-between;flex-shrink:0}
        .panel-body{flex:1;overflow-y:auto;padding:0.5rem}
        .camera-area{display:flex;flex-direction:column;align-items:center;gap:0.3rem}
        .camera-area img,.camera-area video{max-height:130px;width:100%;border-radius:6px;object-fit:contain;background:#000;display:none}
        .placeholder{color:var(--text2);text-align:center;padding:1rem;font-size:0.7rem}
        
        .chat-msgs{display:flex;flex-direction:column;gap:0.3rem}
        .msg{padding:0.4rem;border-radius:6px;font-size:0.7rem;line-height:1.3;max-width:90%}
        .msg.user{background:var(--orange);color:#000;align-self:flex-end}
        .msg.ai{background:#333;color:var(--text);align-self:flex-start;border-left:2px solid var(--orange);white-space:pre-wrap}
        .msg.sys{background:#1a2a1a;color:#6ee7b7;align-self:center;font-size:0.65rem}
        .msg.action{background:#1a3a5c;color:#93c5fd;align-self:center;font-size:0.65rem}
        
        .chat-input{display:flex;gap:0.3rem;padding:0.4rem;border-top:1px solid var(--border);flex-shrink:0}
        .chat-input input{flex:1;padding:0.4rem;background:#0a0a0a;border:1px solid var(--border);border-radius:6px;color:#fff;font-size:0.8rem;min-width:0}
        
        /* MODAL 3D */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:1000;visibility:hidden;opacity:0;transition:0.2s}
        .modal-overlay.active{visibility:visible;opacity:1}
        .modal-3d{background:var(--card);border:2px solid var(--border);border-radius:10px;width:95vw;height:85vh;height:85dvh;display:flex;flex-direction:column;overflow:hidden}
        .modal-3d-body{display:flex;flex:1;overflow:hidden}
        .modal-3d-left{width:280px;min-width:250px;background:#1a1a1a;padding:0.8rem;overflow-y:auto;border-right:2px solid var(--border)}
        .modal-3d-left h3{color:var(--orange);font-size:0.9rem;margin-bottom:0.5rem}
        .modal-3d-right{flex:1;position:relative;background:#d4cfc4;min-height:200px}
        #three-container{width:100%;height:100%;cursor:grab;touch-action:pan-x pan-y pinch-zoom}
        .info-overlay{position:absolute;top:8px;left:8px;z-index:10;display:flex;flex-direction:column;gap:0.2rem}
        .cat-badge{background:var(--orange);color:#000;padding:0.2rem 0.5rem;border-radius:4px;font-weight:800;font-size:0.7rem}
        .med-badge{background:rgba(0,0,0,0.7);color:#fff;padding:0.15rem 0.4rem;border-radius:4px;font-size:0.65rem}
        .controls-help{position:absolute;bottom:8px;left:8px;color:#555;font-size:0.55rem;background:rgba(255,255,255,0.8);padding:0.15rem 0.4rem;border-radius:3px;z-index:10}
        .view-btns{position:absolute;bottom:8px;right:8px;display:flex;gap:0.15rem;z-index:10}
        .view-btn{background:rgba(0,0,0,0.6);border:1px solid #666;color:#fff;padding:0.2rem 0.4rem;border-radius:3px;cursor:pointer;font-size:0.55rem}
        
        .form-group{margin-bottom:0.4rem}
        .form-group label{display:block;color:var(--text2);font-size:0.65rem;margin-bottom:0.1rem}
        .form-group input,.form-group select{width:100%;padding:0.4rem;background:#0a0a0a;border:1px solid var(--border);border-radius:4px;color:#fff;font-size:0.7rem}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.3rem}
        .acabado-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.2rem;margin-bottom:0.4rem}
        .acabado-btn{padding:0.3rem;border-radius:4px;border:2px solid var(--border);background:#0a0a0a;color:#999;cursor:pointer;text-align:center;font-size:0.6rem;font-weight:600}
        .acabado-btn.activo{border-color:var(--orange);color:var(--orange);background:#2a1a0a}
        
        .modal-small{background:var(--card);border:2px solid var(--border);border-radius:10px;width:90vw;max-width:400px;padding:1rem}
        .modal-small h3{color:var(--orange);font-size:0.9rem;margin-bottom:0.8rem}
        
        @media(min-width:1024px){
            .sidebar{width:160px;padding:0.8rem 0.4rem;align-items:stretch}
            .logo{display:block;font-size:1.1rem;text-align:center}
            .nav-item{flex-direction:row;font-size:0.75rem;padding:0.6rem;text-align:left}
            .nav-icon{font-size:1rem}
            .bottom-nav{display:none!important}
        }
        @media(max-width:1023px){
            .sidebar{display:none}
            .bottom-nav{display:block}
            .content{padding-bottom:70px}
            .asistente-layout{grid-template-columns:1fr;height:auto;min-height:50vh}
            .modal-3d-body{flex-direction:column}
            .modal-3d-left{width:100%;min-width:100%;max-height:40%}
            .modal-3d{width:100vw;height:100vh;height:100dvh;border-radius:0}
        }
        @media(max-width:480px){
            .stats-grid{grid-template-columns:repeat(2,1fr)}
            .form-row{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">⚒️ HP</div>
        <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span><span>Dashboard</span></div>
        <div class="nav-item" data-page="inventario"><span class="nav-icon">📦</span><span>Inventario</span></div>
        <div class="nav-item" data-page="asistente"><span class="nav-icon">🤖</span><span>Asistente</span></div>
    </div>
    
    <div class="main">
        <div class="topbar">
            <h1 id="pageTitle">📊 Dashboard</h1>
            <div class="topbar-right">
                <span style="font-size:0.55rem;color:var(--text2)">☁️</span>
                <span class="dot sync" id="syncDot"></span>
                <button class="btn-sm btn-outline" onclick="abrirModalAPI()" style="font-size:0.55rem">🔑</button>
            </div>
        </div>
        
        <div class="content">
            <div class="page active" id="page-dashboard">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="alert-list" id="alertList"></div>
            </div>
            
            <div class="page" id="page-inventario">
                <div class="inv-header">
                    <input type="text" id="searchInv" placeholder="🔍 Buscar..." oninput="renderInventario()">
                    <select id="filtroCat" onchange="renderInventario()"><option>Todos</option></select>
                    <button class="btn btn-sm" onclick="abrirModal3D()">➕</button>
                </div>
                <div class="table-wrap"><table id="tablaInventario"></table></div>
            </div>
            
            <div class="page" id="page-asistente">
                <div class="asistente-layout">
                    <div class="panel">
                        <h3>📸 Captura</h3>
                        <div class="panel-body">
                            <div class="camera-area">
                                <video id="cameraPreview" autoplay playsinline></video>
                                <img id="previewImage" alt="Preview">
                                <canvas id="photoCanvas" style="display:none"></canvas>
                                <div class="placeholder" id="camPlaceholder">📷 Toma o sube foto</div>
                                <div style="display:flex;gap:0.2rem;flex-wrap:wrap;justify-content:center">
                                    <button class="btn btn-sm" onclick="abrirCamara()">📸</button>
                                    <button class="btn-outline btn-sm" onclick="document.getElementById('fileInput').click()">📁</button>
                                    <button class="btn btn-sm" id="btnAnalizar" onclick="analizarFoto()">🔍</button>
                                    <button class="btn-outline btn-sm" id="btnCapturar" onclick="capturarFoto()" style="display:none">📷</button>
                                </div>
                                <input type="file" id="fileInput" accept="image/*" style="display:none">
                            </div>
                        </div>
                    </div>
                    <div class="panel">
                        <h3>💬 Asistente</h3>
                        <div class="panel-body"><div class="chat-msgs" id="chatMessages">
                            <div class="msg ai">👋 <b>¡Hola!</b> Gestiono inventario ☁️<br>• "Usé 5 PTR 2×2"<br>• "Agrega 10 láminas"</div>
                        </div></div>
                        <div class="chat-input">
                            <input type="text" id="preguntaInput" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter')preguntar()">
                            <button class="btn btn-sm" onclick="preguntar()">➤</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <div class="bn-inner">
            <button class="bn-item active" data-page="dashboard"><span class="bn-icon">📊</span>Inicio</button>
            <button class="bn-item" data-page="inventario"><span class="bn-icon">📦</span>Inventario</button>
            <button class="bn-item" data-page="asistente"><span class="bn-icon">🤖</span>Asistente</button>
        </div>
    </nav>
    
    <!-- MODAL API -->
    <div class="modal-overlay" id="modalAPI">
        <div class="modal-small">
            <h3>🔑 API Key Groq</h3>
            <div class="form-group"><input type="password" id="apiKeyInput" placeholder="gsk_..."></div>
            <div style="display:flex;gap:0.3rem;justify-content:flex-end">
                <button class="btn-outline btn-sm" onclick="cerrarModalAPI()">Cancelar</button>
                <button class="btn btn-sm" onclick="guardarAPIKey()">Guardar</button>
            </div>
        </div>
    </div>
    
    <!-- MODAL 3D -->
    <div class="modal-overlay" id="modal3D">
        <div class="modal-3d">
            <div class="modal-3d-body">
                <div class="modal-3d-left">
                    <h3 id="modal3DTitle">🆕 Material</h3>
                    <div class="form-group"><label>Tipo</label><select id="cat3D" onchange="cambioCat3D()"><option value="PTR">🟫 PTR</option><option value="Redondo">🔴 Tubo Cédula</option><option value="Tubo Ligero">🪈 Tubo Ligero</option><option value="Lámina">📄 Lámina</option><option value="Varilla">〰️ Varilla</option><option value="Flecha">🔩 Flecha</option><option value="Angular">📐 Angular</option><option value="Electrodo">⚡ Electrodo</option></select></div>
                    <div class="form-group"><label>Nombre</label><input type="text" id="nombre3D" placeholder="Nombre"></div>
                    <div id="dimensiones3D"></div>
                    <div class="form-group"><label>Acabado</label><div class="acabado-grid"><div class="acabado-btn activo" data-acabado="inox">✨ Inox</div><div class="acabado-btn" data-acabado="carbon">🔩 Carbón</div><div class="acabado-btn" data-acabado="galvanizado">🔧 Galv</div><div class="acabado-btn" data-acabado="negro">🖤 Negro</div></div></div>
                    <div class="form-row"><div class="form-group"><label>Cant</label><input type="number" id="cant3D" value="0"></div><div class="form-group"><label>Unidad</label><input type="text" id="unidad3D" value="pza"></div></div>
                    <div class="form-group"><label>Stock Mín</label><input type="number" id="min3D" value="5"></div>
                    <div class="form-group"><label>Notas</label><input type="text" id="notas3D" placeholder="Calibre..."></div>
                    <input type="hidden" id="edit3DId">
                    <div style="display:flex;gap:0.3rem;margin-top:0.5rem">
                        <button class="btn-outline btn-sm" onclick="cerrarModal3D()">Cancelar</button>
                        <button class="btn btn-sm" onclick="guardarDesde3D()">💾 Guardar</button>
                    </div>
                </div>
                <div class="modal-3d-right">
                    <div id="three-container">
                        <div class="info-overlay"><span class="cat-badge" id="catLabel3D">PTR</span><span class="med-badge" id="medLabel3D">2"×2"×6m</span></div>
                        <div class="controls-help">Desliza: girar | Pellizca: zoom</div>
                        <div class="view-btns">
                            <button class="view-btn" onclick="resetView3D()">🔄</button>
                            <button class="view-btn" onclick="frontView3D()">📷</button>
                            <button class="view-btn" onclick="topView3D()">📐</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBHW_o1NoCXbypvN9OIYMF-wawd9DXjKWA",
            authDomain: "lolp-d56ae.firebaseapp.com",
            projectId: "lolp-d56ae",
            storageBucket: "lolp-d56ae.firebasestorage.app",
            messagingSenderId: "953758856480",
            appId: "1:953758856480:web:8a08fe15b7e3dd4b27d345"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // ==================== ESTADO ====================
        let materiales = [];
        let API_KEY = localStorage.getItem('hp_grok_key') || '';
        let imagenActual = null, stream = null, paginaActual = 'dashboard';
        let acabado3D = 'inox';
        
        // ==================== 3D ====================
        let threeScene, threeCamera, threeRenderer, threeControls, currentMesh;
        
        function initThree() {
            const c = document.getElementById('three-container');
            if(!c || threeScene) return;
            threeScene = new THREE.Scene();
            threeScene.background = new THREE.Color(0xd4cfc4);
            threeCamera = new THREE.PerspectiveCamera(50, c.clientWidth/c.clientHeight, 0.1, 50);
            threeCamera.position.set(2.5, 1.8, 4);
            threeRenderer = new THREE.WebGLRenderer({antialias: true});
            threeRenderer.setSize(c.clientWidth, c.clientHeight);
            threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            c.appendChild(threeRenderer.domElement);
            
            threeControls = new OrbitControls(threeCamera, threeRenderer.domElement);
            threeControls.enableDamping = true;
            threeControls.dampingFactor = 0.08;
            threeControls.target.set(0, 0.3, 0);
            threeControls.touches = {ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN};
            
            threeScene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const k = new THREE.DirectionalLight(0xffffff, 1.2);
            k.position.set(3, 6, 3);
            threeScene.add(k);
            
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(15, 15),
                new THREE.MeshStandardMaterial({color: 0xc8c0b0, roughness: 0.8})
            );
            floor.rotation.x = -Math.PI/2;
            floor.position.y = -1;
            threeScene.add(floor);
            
            const grid = new THREE.GridHelper(6, 20, 0x999999, 0xcccccc);
            grid.position.y = -0.99;
            threeScene.add(grid);
            
            animate3D();
            
            new ResizeObserver(() => {
                if(threeCamera && threeRenderer) {
                    threeCamera.aspect = c.clientWidth / c.clientHeight;
                    threeCamera.updateProjectionMatrix();
                    threeRenderer.setSize(c.clientWidth, c.clientHeight);
                }
            }).observe(c);
        }
        
        function animate3D() {
            requestAnimationFrame(animate3D);
            if(threeControls) threeControls.update();
            if(threeRenderer && threeScene && threeCamera) threeRenderer.render(threeScene, threeCamera);
        }
        
        function clearMesh() {
            if(currentMesh) {
                threeScene.remove(currentMesh);
                currentMesh.geometry?.dispose();
                currentMesh.material?.dispose?.();
                currentMesh = null;
            }
        }
        
        function getMaterial3D(acabado) {
            const mats = {
                inox: new THREE.MeshStandardMaterial({color: 0xd0d0d8, roughness: 0.25, metalness: 0.95}),
                galvanizado: new THREE.MeshStandardMaterial({color: 0xb8bcc0, roughness: 0.35, metalness: 0.8}),
                negro: new THREE.MeshStandardMaterial({color: 0x3a3a3a, roughness: 0.5, metalness: 0.6}),
                carbon: new THREE.MeshStandardMaterial({color: 0x6a6a6a, roughness: 0.55, metalness: 0.5})
            };
            return mats[acabado] || mats.carbon;
        }
        
        function crearGeometria(cat, med, acabado) {
            const mat = getMaterial3D(acabado);
            let geo;
            switch(cat) {
                case 'Lámina': geo = new THREE.BoxGeometry(med.espesor||0.003, med.largo||2.44, med.ancho||1.22); break;
                case 'PTR': geo = new THREE.BoxGeometry(med.ladoA||0.05, med.ladoB||0.05, med.largo||6); break;
                case 'Redondo': case 'Tubo Ligero': geo = new THREE.CylinderGeometry((med.diametro||0.05)/2, (med.diametro||0.05)/2, med.largo||6, 24); break;
                case 'Varilla': geo = new THREE.CylinderGeometry((med.diametro||0.01)/2, (med.diametro||0.01)/2, med.largo||12, 24); break;
                case 'Flecha': geo = new THREE.CylinderGeometry((med.diametro||0.012)/2, (med.diametro||0.012)/2, med.largo||12, 8); break;
                case 'Angular':
                    const s = new THREE.Shape();
                    const aa = med.alaA||0.025, ab = med.alaB||0.025, es = med.espesor||0.003;
                    s.moveTo(0,0); s.lineTo(aa,0); s.lineTo(aa,es); s.lineTo(es,es); s.lineTo(es,ab); s.lineTo(0,ab); s.closePath();
                    geo = new THREE.ExtrudeGeometry(s, {steps:1, depth: med.largo||6, bevelEnabled: true, bevelThickness: 0.001, bevelSize: 0.001});
                    geo.translate(-aa/2, -ab/2, -(med.largo||6)/2);
                    break;
                case 'Electrodo': geo = new THREE.CylinderGeometry((med.diametro||0.003)/2, (med.diametro||0.003)/2, med.largo||0.35, 12); break;
                default: geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            }
            const mesh = new THREE.Mesh(geo, mat);
            const edges = new THREE.EdgesGeometry(geo);
            mesh.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color: 0x000000, transparent: true, opacity: 0.15})));
            return mesh;
        }

        function obtenerMedidas3D() {
            const cat = document.getElementById('cat3D')?.value || 'PTR';
            const g = (id, d) => +(document.getElementById(id)?.value || d);
            const m = {};
            if(cat === 'Lámina') { m.largo = g('m_largo', 2.44); m.ancho = g('m_ancho', 1.22); m.espesor = g('m_espesor', 0.003); }
            else if(cat === 'PTR') { m.ladoA = g('m_ladoA', 0.0508); m.ladoB = g('m_ladoB', 0.0508); m.espesor = g('m_espesor', 0.0019); m.largo = g('m_largo', 6); }
            else if(cat === 'Redondo' || cat === 'Tubo Ligero') { m.diametro = g('m_diametro', 0.0483); m.espesor = g('m_espesor', 0.0012); m.largo = g('m_largo', 6); }
            else if(cat === 'Varilla') { m.diametro = g('m_diametro', 0.0095); m.largo = g('m_largo', 12); }
            else if(cat === 'Flecha') { m.diametro = g('m_diametro', 0.0127); m.largo = g('m_largo', 12); }
            else if(cat === 'Angular') { m.alaA = g('m_alaA', 0.0254); m.alaB = g('m_alaB', 0.0254); m.espesor = g('m_espesor', 0.003175); m.largo = g('m_largo', 6); }
            else if(cat === 'Electrodo') { m.diametro = g('m_diametro', 0.0032); m.largo = g('m_largo', 0.35); }
            return m;
        }
        
        function formatearMedidas3D(cat, m) {
            if(cat === 'Lámina') return `${(m.largo||0).toFixed(2)}m × ${(m.ancho||0).toFixed(2)}m`;
            if(cat === 'PTR') return `${((m.ladoA||0)*39.37).toFixed(1)}"×${((m.ladoB||0)*39.37).toFixed(1)}"×${(m.largo||0).toFixed(1)}m`;
            if(cat === 'Redondo' || cat === 'Tubo Ligero') return `Ø${((m.diametro||0)*39.37).toFixed(1)}"×${(m.largo||0).toFixed(1)}m`;
            if(cat === 'Varilla' || cat === 'Flecha') return `Ø${((m.diametro||0)*1000).toFixed(1)}mm×${(m.largo||0).toFixed(1)}m`;
            if(cat === 'Angular') return `${((m.alaA||0)*39.37).toFixed(1)}"×${((m.alaB||0)*39.37).toFixed(1)}"×${(m.largo||0).toFixed(1)}m`;
            if(cat === 'Electrodo') return `Ø${((m.diametro||0)*1000).toFixed(1)}mm×${((m.largo||0)*100).toFixed(0)}cm`;
            return '';
        }

        async function preguntar(txt) {
            const inp = document.getElementById('preguntaInput');
            const p = txt || inp.value.trim();
            if(!p || !API_KEY) return;
            agregarMsg('user', p); if(!txt) inp.value = ''; agregarMsg('sys','💭...');
            
            const invStr = materiales.map(m => `ID:${m.idFirestore}|${m.nombre}|Stock:${m.cantidad}`).join('\n');
            const prompt = `Eres ASISTENTE DE INVENTARIO. Si es operación de stock, responde JSON: {"accion":"usar","items":[{"id":"FIRESTORE_ID","cantidad":3}],"respuesta":"OK"} o {"accion":"pregunta","respuesta":"..."}. INVENTARIO:\n${invStr}\n\nUSUARIO: "${p}"`;
            
            try {
                const resp = await llamarIA(prompt, null);
                quitarCargando();
                try {
                    const json = JSON.parse(resp);
                    if(json.accion === 'usar' || json.accion === 'agregar') {
                        for(let item of json.items) {
                            const m = materiales.find(m => m.idFirestore === item.id);
                            if(m) {
                                m.cantidad = json.accion === 'usar' ? Math.max(0, m.cantidad - item.cantidad) : m.cantidad + item.cantidad;
                                await db.collection('materiales').doc(m.idFirestore).update({cantidad: m.cantidad});
                            }
                        }
                        agregarMsg('action', json.respuesta || '✅ Actualizado ☁️');
                        renderDashboard(); if(paginaActual === 'inventario') renderInventario();
                    } else { agregarMsg('ai', json.respuesta || resp); }
                } catch(e) { agregarMsg('ai', resp); }
            } catch(e) { quitarCargando(); agregarMsg('sys','❌'); }
        }
        
        async function llamarIA(prompt, img) {
            const msgs = [];
            if(img) msgs.push({role:"user",content:[{type:"text",text:prompt},{type:"image_url",image_url:{url:img}}]});
            else msgs.push({role:"user",content:prompt});
            const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method:'POST', headers:{'Authorization':`Bearer ${API_KEY}`,'Content-Type':'application/json'},
                body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',messages:msgs,max_tokens:1500,temperature:0.3})
            });
            if(!r.ok) throw new Error('Error');
            return (await r.json()).choices[0].message.content;
        }
        
        function agregarMsg(tipo, txt) {
            const c = document.getElementById('chatMessages'), d = document.createElement('div');
            d.className = 'msg ' + tipo; d.innerHTML = txt;
            c.appendChild(d); d.scrollIntoView({behavior:'smooth'});
        }
        function quitarCargando() {
            const msgs = document.getElementById('chatMessages').children;
            for(let m of msgs) if(m.textContent.includes('💭')||m.textContent.includes('🔍')) { m.remove(); break; }
        }
        
        window.preguntar = preguntar;
        window.analizarFoto = analizarFoto;
        
        // ==================== INICIAR ====================
        iniciarSync();
        if(!API_KEY) setTimeout(abrirModalAPI, 1000);
    </script>
</body>
</html>
