<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HerreriaPRO ☁️</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js">
    </script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <style>
        :root {
            --bg:#1a1a1a;--card:#252525;--border:#333;--orange:#f97316;--text:#e0e0e0;--text2:#888;
            --danger:#ef4444;--success:#10b981;--sidebar-w:60px;--topbar-h:50px;
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        body{background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;overflow:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        
        .sidebar{width:var(--sidebar-w);background:#111;padding:0.8rem 0.3rem;display:flex;flex-direction:column;gap:0.3rem;border-right:2px solid var(--border);flex-shrink:0;align-items:center}
        .logo{font-size:1rem;font-weight:800;color:var(--orange);margin-bottom:1rem;display:none}
        .nav-item{padding:0.6rem;border-radius:10px;cursor:pointer;color:#999;font-size:0.65rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:100%;transition:0.2s}
        .nav-icon{font-size:1.2rem}
        .nav-item.active{background:var(--orange);color:#000;font-weight:700}
        .nav-item:active{transform:scale(0.95)}
        
        .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid var(--border);z-index:100;padding:0.3rem 0 env(safe-area-inset-bottom,0.5rem)}
        .bn-inner{display:flex;justify-content:space-around}
        .bn-item{display:flex;flex-direction:column;align-items:center;gap:0.2rem;padding:0.4rem;color:#999;cursor:pointer;font-size:0.6rem;border-radius:8px;border:none;background:none}
        .bn-item.active{color:var(--orange);font-weight:700}
        .bn-icon{font-size:1.3rem}
        
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .topbar{background:#111;padding:0 1rem;height:var(--topbar-h);border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
        .topbar h1{font-size:clamp(0.9rem,2.2vw,1.2rem);color:var(--orange)}
        .topbar-right{display:flex;align-items:center;gap:0.5rem}
        .dot{width:7px;height:7px;border-radius:50%}
        .dot.on{background:var(--success);box-shadow:0 0 5px var(--success)}
        .dot.off{background:var(--danger)}
        .dot.sync{background:#fbbf24;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .content{flex:1;overflow-y:auto;padding:0.8rem;-webkit-overflow-scrolling:touch}
        .page{display:none}
        .page.active{display:block}
        
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:0.5rem;margin-bottom:1rem}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.8rem;text-align:center}
        .stat-card .num{font-size:clamp(1.2rem,3vw,1.8rem);font-weight:800;color:var(--orange)}
        .stat-card .lbl{font-size:0.6rem;color:var(--text2);text-transform:uppercase;margin-top:0.2rem}
        
        .alert-list{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.8rem;margin-bottom:0.8rem}
        .alert-list h3{color:var(--orange);margin-bottom:0.5rem;font-size:0.8rem}
        .alert-item{display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.75rem;gap:0.5rem}
        .badge{padding:0.2rem 0.4rem;border-radius:10px;font-size:0.6rem;font-weight:700;white-space:nowrap}
        .badge.warn{background:#7c2d12;color:#fdba74}
        .badge.danger{background:#450a0a;color:#fca5a5}
        .badge.ok{background:#065f46;color:#6ee7b7}
        
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;background:var(--card);border:1px solid var(--border)}
        table{width:100%;min-width:500px;border-collapse:collapse;font-size:0.75rem}
        th{background:#0a0a0a;color:var(--orange);font-size:0.6rem;text-transform:uppercase;padding:0.5rem;text-align:left;position:sticky;top:0}
        td{padding:0.5rem;border-bottom:1px solid var(--border);white-space:nowrap}
        td:first-child{white-space:normal;min-width:100px}
        tr:active td{background:#333}
        
        .btn{background:var(--orange);color:#000;border:none;padding:0.5rem 0.8rem;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.75rem;min-height:36px;transition:0.2s}
        .btn:active{transform:scale(0.95)}
        .btn-outline{background:transparent;border:1px solid var(--orange);color:var(--orange);padding:0.5rem 0.8rem;border-radius:8px;cursor:pointer;font-size:0.75rem;min-height:36px}
        .btn-sm{padding:0.3rem 0.5rem;font-size:0.65rem;min-height:28px}
        
        .inv-header{display:flex;gap:0.4rem;margin-bottom:0.8rem;flex-wrap:wrap}
        .inv-header input{flex:1;padding:0.5rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:0.85rem;min-width:120px}
        .inv-header select{padding:0.5rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:0.75rem}
        
        .asistente-layout{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;height:calc(100vh - var(--topbar-h) - 3rem)}
        .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden}
        .panel h3{color:var(--orange);padding:0.6rem 0.8rem;border-bottom:1px solid var(--border);font-size:0.8rem;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
        .panel-body{flex:1;overflow-y:auto;padding:0.6rem}
        .camera-area{display:flex;flex-direction:column;align-items:center;gap:0.4rem}
        .camera-area img,.camera-area video{max-height:150px;width:100%;border-radius:8px;object-fit:contain;background:#000;display:none}
        .placeholder{color:var(--text2);text-align:center;padding:1.5rem;font-size:0.75rem}
        
        .chat-msgs{display:flex;flex-direction:column;gap:0.4rem}
        .msg{padding:0.5rem;border-radius:8px;font-size:0.75rem;line-height:1.4;max-width:90%}
        .msg.user{background:var(--orange);color:#000;align-self:flex-end}
        .msg.ai{background:#333;color:var(--text);align-self:flex-start;border-left:3px solid var(--orange);white-space:pre-wrap}
        .msg.sys{background:#1a2a1a;color:#6ee7b7;align-self:center;font-size:0.7rem}
        .msg.action{background:#1a3a5c;color:#93c5fd;align-self:center;font-size:0.7rem;border:1px solid #3b82f6}
        
        .chat-input{display:flex;gap:0.3rem;padding:0.5rem;border-top:1px solid var(--border);flex-shrink:0}
        .chat-input input{flex:1;padding:0.5rem;background:#0a0a0a;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:0.85rem;min-width:0}
        
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:1000;visibility:hidden;opacity:0;transition:0.2s}
        .modal-overlay.active{visibility:visible;opacity:1}
        .modal{background:var(--card);border:2px solid var(--border);border-radius:12px;width:95vw;max-width:700px;max-height:85vh;overflow-y:auto;padding:1.5rem}
        .modal h2{color:var(--orange);margin-bottom:1rem;font-size:1rem}
        .form-group{margin-bottom:0.6rem}
        .form-group label{display:block;color:var(--text2);font-size:0.7rem;margin-bottom:0.15rem;font-weight:600}
        .form-group input,.form-group select{width:100%;padding:0.5rem;background:#0a0a0a;border:1px solid var(--border);border-radius:6px;color:#fff;font-size:0.8rem}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem}
        .form-actions{display:flex;gap:0.4rem;margin-top:1rem;justify-content:flex-end}
        
        .sync-badge{display:flex;align-items:center;gap:0.3rem;font-size:0.6rem;color:var(--text2)}
        
        @media(min-width:1024px){
            :root{--sidebar-w:170px}
            .sidebar{padding:1rem 0.5rem;align-items:stretch}
            .logo{display:block;font-size:1.2rem;text-align:center}
            .nav-item{flex-direction:row;font-size:0.8rem;padding:0.7rem;text-align:left}
            .nav-icon{font-size:1rem}
            .bottom-nav{display:none!important}
        }
        @media(max-width:1023px){
            .sidebar{display:none}
            .bottom-nav{display:block}
            .content{padding-bottom:80px}
            .asistente-layout{grid-template-columns:1fr;height:auto;min-height:50vh}
            .modal{width:95vw;max-width:95vw;border-radius:8px}
        }
        @media(max-width:480px){
            .stats-grid{grid-template-columns:repeat(2,1fr)}
            .form-row{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <!-- SIDEBAR DESKTOP -->
    <div class="sidebar" id="sidebar">
        <div class="logo">⚒️ HP</div>
        <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span><span>Dashboard</span></div>
        <div class="nav-item" data-page="inventario"><span class="nav-icon">📦</span><span>Inventario</span></div>
        <div class="nav-item" data-page="asistente"><span class="nav-icon">🤖</span><span>Asistente</span></div>
    </div>
    
    <div class="main">
        <div class="topbar">
            <h1 id="pageTitle">📊 Dashboard</h1>
            <div class="topbar-right">
                <span class="sync-badge" id="syncBadge"><span class="dot sync" id="syncDot"></span> ☁️</span>
                <button class="btn-sm btn-outline" onclick="abrirModalAPI()">🔑</button>
            </div>
        </div>
        
        <div class="content">
            <div class="page active" id="page-dashboard">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="alert-list" id="alertList"></div>
            </div>
            
            <div class="page" id="page-inventario">
                <div class="inv-header">
                    <input type="text" id="searchInv" placeholder="🔍 Buscar..." oninput="renderInventario()">
                    <select id="filtroCat" onchange="renderInventario()"><option>Todos</option></select>
                    <button class="btn btn-sm" onclick="abrirModalMaterial()">➕</button>
                </div>
                <div class="table-wrap"><table id="tablaInventario"></table></div>
            </div>
            
            <div class="page" id="page-asistente">
                <div class="asistente-layout">
                    <div class="panel">
                        <h3>📸 Captura</h3>
                        <div class="panel-body">
                            <div class="camera-area">
                                <video id="cameraPreview" autoplay playsinline></video>
                                <img id="previewImage" alt="Preview">
                                <canvas id="photoCanvas" style="display:none"></canvas>
                                <div class="placeholder" id="camPlaceholder">📷 Toma o sube foto</div>
                                <div style="display:flex;gap:0.3rem;flex-wrap:wrap;justify-content:center">
                                    <button class="btn btn-sm" onclick="abrirCamara()">📸</button>
                                    <button class="btn-outline btn-sm" onclick="document.getElementById('fileInput').click()">📁</button>
                                    <button class="btn btn-sm" id="btnAnalizar" onclick="analizarFoto()">🔍</button>
                                    <button class="btn-outline btn-sm" id="btnCapturar" onclick="capturarFoto()" style="display:none">📷</button>
                                </div>
                                <input type="file" id="fileInput" accept="image/*" style="display:none">
                            </div>
                        </div>
                    </div>
                    <div class="panel">
                        <h3>💬 Asistente <button class="btn-sm btn-outline" id="btnVoice" onclick="toggleVoz()" style="font-size:0.6rem">🎤</button></h3>
                        <div class="panel-body"><div class="chat-msgs" id="chatMessages">
                            <div class="msg ai">👋 <b>¡Hola!</b> Gestiono inventario en la nube:<br>• "Usé 5 PTR 2×2"<br>• "Agrega 10 láminas"<br>• "¿Cuánto stock hay?"<br>☁️ Datos sincronizados</div>
                        </div></div>
                        <div class="chat-input">
                            <input type="text" id="preguntaInput" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter')preguntar()">
                            <button class="btn btn-sm" onclick="preguntar()">➤</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="bn-inner">
            <button class="bn-item active" data-page="dashboard"><span class="bn-icon">📊</span>Inicio</button>
            <button class="bn-item" data-page="inventario"><span class="bn-icon">📦</span>Inventario</button>
            <button class="bn-item" data-page="asistente"><span class="bn-icon">🤖</span>Asistente</button>
        </div>
    </nav>
    
    <!-- MODAL API KEY -->
    <div class="modal-overlay" id="modalAPI">
        <div class="modal">
            <h2>🔑 Configuración</h2>
            <div class="form-group"><label>API Key de Groq</label><input type="password" id="apiKeyInput" placeholder="gsk_..."></div>
            <div class="form-actions">
                <button class="btn-outline btn-sm" onclick="cerrarModalAPI()">Cancelar</button>
                <button class="btn btn-sm" onclick="guardarAPIKey()">Guardar</button>
            </div>
        </div>
    </div>
    
    <!-- MODAL MATERIAL -->
    <div class="modal-overlay" id="modalMaterial">
        <div class="modal">
            <h2 id="modalTitle">🆕 Material</h2>
            <div class="form-group"><label>Tipo</label><select id="catSelect"><option value="PTR">🟫 PTR</option><option value="Redondo">🔴 Tubo Cédula</option><option value="Tubo Ligero">🪈 Tubo Ligero</option><option value="Lámina">📄 Lámina</option><option value="Varilla">〰️ Varilla</option><option value="Flecha">🔩 Flecha</option><option value="Angular">📐 Angular</option><option value="Electrodo">⚡ Electrodo</option></select></div>
            <div class="form-group"><label>Nombre</label><input type="text" id="nombreInput" placeholder="Nombre del material"></div>
            <div class="form-group"><label>Acabado</label><select id="acabadoSelect"><option value="inox">✨ Inoxidable</option><option value="carbon">🔩 Acero Carbón</option><option value="galvanizado">🔧 Galvanizado</option><option value="negro">🖤 Hierro Negro</option></select></div>
            <div class="form-row">
                <div class="form-group"><label>Cantidad</label><input type="number" id="cantidadInput" value="0" min="0"></div>
                <div class="form-group"><label>Unidad</label><input type="text" id="unidadInput" value="pza"></div>
            </div>
            <div class="form-group"><label>Stock Mínimo</label><input type="number" id="minInput" value="5" min="0"></div>
            <div class="form-group"><label>Notas</label><input type="text" id="notasInput" placeholder="Calibre, uso..."></div>
            <input type="hidden" id="editId">
            <div class="form-actions">
                <button class="btn-outline btn-sm" onclick="cerrarModalMaterial()">Cancelar</button>
                <button class="btn btn-sm" onclick="guardarMaterial()">💾 Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBHW_o1NoCXbypvN9OIYMF-wawd9DXjKWA",
            authDomain: "lolp-d56ae.firebaseapp.com",
            projectId: "lolp-d56ae",
            storageBucket: "lolp-d56ae.firebasestorage.app",
            messagingSenderId: "953758856480",
            appId: "1:953758856480:web:8a08fe15b7e3dd4b27d345"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // ==================== ESTADO ====================
        let materiales = [];
        let API_KEY = localStorage.getItem('hp_groq_key') || '';
        let imagenActual = null, stream = null, paginaActual = 'dashboard';
        let recognition = null, escuchando = false;
        let escuchandoFirestore = false;
        
        // ==================== SINCRONIZACIÓN EN TIEMPO REAL ====================
        function iniciarSincronizacion() {
            if(escuchandoFirestore) return;
            escuchandoFirestore = true;
            
            document.getElementById('syncDot').className = 'dot sync';
            
            db.collection('materiales').onSnapshot((snapshot) => {
                materiales = [];
                snapshot.forEach((doc) => {
                    materiales.push({idFirestore: doc.id, ...doc.data()});
                });
                
                document.getElementById('syncDot').className = 'dot on';
                setTimeout(() => {
                    document.getElementById('syncDot').className = 'dot on';
                }, 500);
                
                renderDashboard();
                if(paginaActual === 'inventario') renderInventario();
            }, (error) => {
                console.error('Error sincronización:', error);
                document.getElementById('syncDot').className = 'dot off';
                // Si falla Firestore, cargar datos locales
                cargarLocales();
            });
        }
        
        function cargarLocales() {
            const datos = JSON.parse(localStorage.getItem('hp_materiales') || '[]');
            if(datos.length > 0) {
                materiales = datos;
                renderDashboard();
                if(paginaActual === 'inventario') renderInventario();
            } else if(materiales.length === 0) {
                // Datos iniciales
                materiales = [
                    {id:1,categoria:'PTR',nombre:'PTR 2×2 cal 14',cantidad:45,unidad:'pza',min:10,acabado:'inox',notas:''},
                    {id:2,categoria:'Redondo',nombre:'Tubo Redondo 2" céd 40',cantidad:25,unidad:'pza',min:10,acabado:'carbon',notas:'Céd 40'},
                    {id:3,categoria:'Lámina',nombre:'Lámina Negra 3mm',cantidad:12,unidad:'hoja',min:5,acabado:'carbon',notas:''},
                    {id:4,categoria:'Flecha',nombre:'Flecha 1/2"',cantidad:80,unidad:'pza',min:30,acabado:'negro',notas:''},
                    {id:5,categoria:'Varilla',nombre:'Varilla 3/8 Inox',cantidad:60,unidad:'pza',min:20,acabado:'inox',notas:''},
                    {id:6,categoria:'Angular',nombre:'Angular 1"×1/8',cantidad:0,unidad:'pza',min:10,acabado:'carbon',notas:''},
                    {id:7,categoria:'Electrodo',nombre:'Electrodo 6013 1/8',cantidad:200,unidad:'pza',min:50,acabado:'carbon',notas:''},
                    {id:8,categoria:'Tubo Ligero',nombre:'Tubo Redondo 1 1/2" ligero',cantidad:50,unidad:'pza',min:20,acabado:'negro',notas:'Cal 18'},
                ];
                renderDashboard();
                if(paginaActual === 'inventario') renderInventario();
            }
        }
        
        async function guardarEnFirestore(material) {
            try {
                if(material.idFirestore) {
                    await db.collection('materiales').doc(material.idFirestore).update(material);
                } else {
                    const docRef = await db.collection('materiales').add(material);
                    material.idFirestore = docRef.id;
                }
                // También guardar local como respaldo
                localStorage.setItem('hp_materiales', JSON.stringify(materiales));
                return true;
            } catch(e) {
                console.error('Error al guardar:', e);
                // Guardar local si falla la nube
                localStorage.setItem('hp_materiales', JSON.stringify(materiales));
                return false;
            }
        }
        
        async function eliminarDeFirestore(idFirestore) {
            try {
                await db.collection('materiales').doc(idFirestore).delete();
                localStorage.setItem('hp_materiales', JSON.stringify(materiales));
                return true;
            } catch(e) {
                console.error('Error al eliminar:', e);
                return false;
            }
        }
        
        // ==================== NAVEGACIÓN ====================
        function navegarA(page) {
            paginaActual = page;
            document.querySelectorAll('.nav-item, .bn-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll(`[data-page="${page}"]`).forEach(i => i.classList.add('active'));
            document.getElementById('pageTitle').textContent = page==='dashboard'?'📊 Dashboard':page==='inventario'?'📦 Inventario':'🤖 Asistente';
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+page).classList.add('active');
            if(page==='dashboard') renderDashboard();
            if(page==='inventario') renderInventario();
        }
        
        document.querySelectorAll('.nav-item, .bn-item').forEach(item => {
            item.addEventListener('click', () => navegarA(item.dataset.page));
        });
        
        // ==================== API KEY ====================
        function abrirModalAPI() {
            document.getElementById('apiKeyInput').value = API_KEY;
            document.getElementById('modalAPI').classList.add('active');
        }
        function cerrarModalAPI() { document.getElementById('modalAPI').classList.remove('active'); }
        
        function guardarAPIKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if(key && !key.startsWith('gsk_')) return alert('Key inválida');
            API_KEY = key;
            localStorage.setItem('hp_groq_key', key);
            cerrarModalAPI();
        }
        
        // ==================== DASHBOARD ====================
        function renderDashboard() {
            if(materiales.length === 0) {
                document.getElementById('statsGrid').innerHTML = '<div class="stat-card"><div class="num">☁️</div><div class="lbl">Sincronizando...</div></div>';
                document.getElementById('alertList').innerHTML = '<h3>⚠️ Alertas</h3><p style="color:#888">Conectando con la nube...</p>';
                return;
            }
            const total = materiales.length;
            const bajo = materiales.filter(m => m.cantidad <= m.min && m.cantidad > 0).length;
            const agotado = materiales.filter(m => m.cantidad === 0).length;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total ☁️</div></div>
                <div class="stat-card"><div class="num" style="color:#6ee7b7">${total-bajo-agotado}</div><div class="lbl">OK</div></div>
                <div class="stat-card"><div class="num" style="color:#fdba74">${bajo}</div><div class="lbl">Bajo</div></div>
                <div class="stat-card"><div class="num" style="color:#fca5a5">${agotado}</div><div class="lbl">Agotado</div></div>
            `;
            
            const alerts = materiales.filter(m => m.cantidad <= m.min);
            document.getElementById('alertList').innerHTML = `
                <h3>⚠️ Alertas</h3>
                ${alerts.length === 0 ? '<p style="color:#888">✅ Todo en orden</p>' : 
                alerts.map(m => `<div class="alert-item"><span>${m.nombre} (${m.cantidad})</span><span class="badge ${m.cantidad===0?'danger':'warn'}">${m.cantidad===0?'AGOTADO':'BAJO'}</span></div>`).join('')}
            `;
        }
        
        // ==================== INVENTARIO ====================
        function renderInventario() {
            if(materiales.length === 0) {
                document.getElementById('tablaInventario').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem">☁️ Sincronizando...</td></tr>';
                return;
            }
            const s = document.getElementById('searchInv')?.value?.toLowerCase() || '';
            const c = document.getElementById('filtroCat')?.value || 'Todos';
            const cats = ['Todos', ...new Set(materiales.map(m => m.categoria))];
            document.getElementById('filtroCat').innerHTML = cats.map(cat => `<option ${c===cat?'selected':''}>${cat}</option>`).join('');
            
            const filtrados = materiales.filter(m => (c==='Todos'||m.categoria===c) && m.nombre.toLowerCase().includes(s));
            
            document.getElementById('tablaInventario').innerHTML = `
                <thead><tr><th>Material</th><th>Cat</th><th>Cant</th><th>Estado</th><th>Acc</th></tr></thead>
                <tbody>${filtrados.map(m => `
                    <tr>
                        <td><b>${m.nombre}</b>${m.notas?`<br><small style="color:#888">${m.notas}</small>`:''}</td>
                        <td>${m.categoria}</td>
                        <td>${m.cantidad} ${m.unidad}</td>
                        <td><span class="badge ${m.cantidad===0?'danger':m.cantidad<=m.min?'warn':'ok'}">${m.cantidad===0?'AGOTADO':m.cantidad<=m.min?'BAJO':'OK'}</span></td>
                        <td>
                            <button class="btn-outline btn-sm" onclick="editarMaterial('${m.idFirestore||m.id}')">✏️</button>
                            <button class="btn-outline btn-sm" onclick="eliminarMaterial('${m.idFirestore||m.id}')" style="color:#ef4444;border-color:#ef4444">🗑️</button>
                        </td>
                    </tr>
                `).join('')}</tbody>
            `;
        }
        
        // ==================== CRUD MATERIALES ====================
        function abrirModalMaterial(mat) {
            document.getElementById('modalMaterial').classList.add('active');
            if(mat) {
                document.getElementById('modalTitle').textContent = '✏️ Editar Material';
                document.getElementById('catSelect').value = mat.categoria;
                document.getElementById('nombreInput').value = mat.nombre;
                document.getElementById('acabadoSelect').value = mat.acabado || 'carbon';
                document.getElementById('cantidadInput').value = mat.cantidad;
                document.getElementById('unidadInput').value = mat.unidad;
                document.getElementById('minInput').value = mat.min;
                document.getElementById('notasInput').value = mat.notas || '';
                document.getElementById('editId').value = mat.idFirestore || mat.id;
            } else {
                document.getElementById('modalTitle').textContent = '🆕 Nuevo Material';
                document.getElementById('catSelect').value = 'PTR';
                document.getElementById('nombreInput').value = '';
                document.getElementById('acabadoSelect').value = 'inox';
                document.getElementById('cantidadInput').value = '0';
                document.getElementById('unidadInput').value = 'pza';
                document.getElementById('minInput').value = '5';
                document.getElementById('notasInput').value = '';
                document.getElementById('editId').value = '';
            }
        }
        
        function cerrarModalMaterial() { document.getElementById('modalMaterial').classList.remove('active'); }
        
        async function guardarMaterial() {
            const id = document.getElementById('editId').value;
            const datos = {
                categoria: document.getElementById('catSelect').value,
                nombre: document.getElementById('nombreInput').value.trim(),
                acabado: document.getElementById('acabadoSelect').value,
                cantidad: parseInt(document.getElementById('cantidadInput').value) || 0,
                unidad: document.getElementById('unidadInput').value.trim() || 'pza',
                min: parseInt(document.getElementById('minInput').value) || 5,
                notas: document.getElementById('notasInput').value.trim()
            };
            
            if(!datos.nombre) return alert('⚠️ Nombre obligatorio');
            
            if(id) {
                const idx = materiales.findIndex(m => (m.idFirestore||m.id) == id);
                if(idx !== -1) {
                    materiales[idx] = {...materiales[idx], ...datos};
                    await guardarEnFirestore(materiales[idx]);
                }
            } else {
                const nuevo = {...datos};
                await guardarEnFirestore(nuevo);
            }
            
            cerrarModalMaterial();
            renderDashboard();
            if(paginaActual === 'inventario') renderInventario();
        }
        
        function editarMaterial(id) {
            const m = materiales.find(m => (m.idFirestore||m.id) == id);
            if(m) abrirModalMaterial(m);
        }
        
        async function eliminarMaterial(id) {
            if(!confirm('¿Eliminar este material?')) return;
            const m = materiales.find(m => (m.idFirestore||m.id) == id);
            if(m && m.idFirestore) {
                await eliminarDeFirestore(m.idFirestore);
                materiales = materiales.filter(m => (m.idFirestore||m.id) != id);
                renderDashboard();
                if(paginaActual === 'inventario') renderInventario();
            }
        }
        
        // ==================== CÁMARA ====================
        document.getElementById('fileInput').addEventListener('change', e => {
            const f = e.target.files[0];
            if(!f) return;
            const r = new FileReader();
            r.onload = ev => { imagenActual = ev.target.result; mostrarPreview(imagenActual); };
            r.readAsDataURL(f);
        });
        
        async function abrirCamara() {
            try {
                if(stream) stream.getTracks().forEach(t => t.stop());
                stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}}});
                const v = document.getElementById('cameraPreview');
                v.srcObject = stream; v.style.display = 'block';
                document.getElementById('previewImage').style.display = 'none';
                document.getElementById('camPlaceholder').style.display = 'none';
                document.getElementById('btnCapturar').style.display = 'inline-block';
            } catch(err) { alert('No se pudo abrir cámara'); }
        }
        
        function capturarFoto() {
            const v = document.getElementById('cameraPreview'), c = document.getElementById('photoCanvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            imagenActual = c.toDataURL('image/jpeg', 0.7);
            mostrarPreview(imagenActual);
            if(stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            document.getElementById('btnCapturar').style.display = 'none';
        }
        
        function mostrarPreview(src) {
            document.getElementById('previewImage').src = src;
            document.getElementById('previewImage').style.display = 'block';
            document.getElementById('cameraPreview').style.display = 'none';
            document.getElementById('camPlaceholder').style.display = 'none';
        }
        
        // ==================== IA ====================
        async function analizarFoto() {
            if(!API_KEY) return alert('Configura tu API Key de Groq');
            if(!imagenActual) return alert('Toma una foto primero');
            agregarMsg('user','📸 [Foto]'); agregarMsg('sys','🔍 Analizando...');
            try {
                const r = await llamarIA('Eres MAESTRO HERRERO. Analiza esta imagen. Inventario:'+materiales.map(m=>`${m.nombre}:${m.cantidad}`).join('|'), imagenActual);
                quitarCargando(); agregarMsg('ai', r);
            } catch(e) { quitarCargando(); agregarMsg('sys','❌ '+e.message); }
        }
        
        async function preguntar(txt) {
            const inp = document.getElementById('preguntaInput');
            const p = txt || inp.value.trim();
            if(!p) return;
            if(!API_KEY) return alert('Configura tu API Key de Groq');
            
            agregarMsg('user', p);
            if(!txt) inp.value = '';
            agregarMsg('sys','💭...');
            
            const invStr = materiales.map(m => `ID:${m.idFirestore||m.id}|${m.nombre}|Stock:${m.cantidad}${m.unidad}`).join('\n');
            const prompt = `Eres ASISTENTE DE INVENTARIO de herrería. Si el usuario dice que USÓ/AGREGÓ/QUITÓ materiales, responde SOLO JSON: {"accion":"usar","items":[{"id":"ID_FIRESTORE","cantidad":3}],"respuesta":"OK"} o {"accion":"agregar","items":[{"id":"ID_FIRESTORE","cantidad":20}],"respuesta":"OK"}. Si pregunta stock: {"accion":"pregunta","respuesta":"..."}. Si es pregunta técnica, responde normal.\n\nINVENTARIO:\n${invStr}\n\nUSUARIO: "${p}"`;
            
            try {
                const resp = await llamarIA(prompt, null);
                quitarCargando();
                try {
                    const json = JSON.parse(resp);
                    if(json.accion === 'usar' || json.accion === 'agregar') {
                        for(let item of json.items) {
                            const m = materiales.find(m => (m.idFirestore||m.id) == item.id);
                            if(m) {
                                m.cantidad = json.accion === 'usar' ? Math.max(0, m.cantidad - item.cantidad) : m.cantidad + item.cantidad;
                                await guardarEnFirestore(m);
                            }
                        }
                        agregarMsg('action', json.respuesta || '✅ Actualizado ☁️');
                        renderDashboard();
                        if(paginaActual === 'inventario') renderInventario();
                    } else {
                        agregarMsg('ai', json.respuesta || resp);
                    }
                } catch(e) {
                    agregarMsg('ai', resp);
                }
            } catch(e) {
                quitarCargando();
                agregarMsg('sys','❌ '+e.message);
            }
        }
        
        async function llamarIA(prompt, img) {
            const msgs = [];
            if(img) msgs.push({role:"user",content:[{type:"text",text:prompt},{type:"image_url",image_url:{url:img}}]});
            else msgs.push({role:"user",content:prompt});
            
            const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method:'POST',
                headers:{'Authorization':`Bearer ${API_KEY}`,'Content-Type':'application/json'},
                body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',messages:msgs,max_tokens:1500,temperature:0.3})
            });
            
            if(!r.ok) throw new Error((await r.json().catch(()=>({})))?.error?.message||'Error');
            return (await r.json()).choices[0].message.content;
        }
        
        function agregarMsg(tipo, txt) {
            const c = document.getElementById('chatMessages');
            const d = document.createElement('div');
            d.className = 'msg ' + tipo;
            d.innerHTML = txt;
            c.appendChild(d);
            d.scrollIntoView({behavior:'smooth'});
        }
        
        function quitarCargando() {
            const msgs = document.getElementById('chatMessages').children;
            for(let m of msgs) if(m.textContent.includes('💭')||m.textContent.includes('🔍')) { m.remove(); break; }
        }
        
        // ==================== VOZ ====================
        function toggleVoz() {
            const btn = document.getElementById('btnVoice');
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SR) return alert('Usa Chrome para voz');
            
            if(!recognition) {
                recognition = new SR();
                recognition.lang = 'es-MX';
                recognition.continuous = false;
                recognition.onresult = e => {
                    document.getElementById('preguntaInput').value = e.results[0][0].transcript;
                    btn.textContent = '🎤';
                    escuchando = false;
                    preguntar();
                };
                recognition.onerror = () => { btn.textContent = '🎤'; escuchando = false; };
                recognition.onend = () => { btn.textContent = '🎤'; escuchando = false; };
            }
            
            if(escuchando) {
                recognition.stop();
                btn.textContent = '🎤';
                escuchando = false;
            } else {
                recognition.start();
                btn.textContent = '🔴';
                escuchando = true;
            }
        }
        
        // ==================== EXPONER ====================
        window.preguntar = preguntar;
        window.analizarFoto = analizarFoto;
        window.abrirCamara = abrirCamara;
        window.capturarFoto = capturarFoto;
        window.guardarAPIKey = guardarAPIKey;
        window.abrirModalAPI = abrirModalAPI;
        window.cerrarModalAPI = cerrarModalAPI;
        window.abrirModalMaterial = abrirModalMaterial;
        window.cerrarModalMaterial = cerrarModalMaterial;
        window.guardarMaterial = guardarMaterial;
        window.editarMaterial = editarMaterial;
        window.eliminarMaterial = eliminarMaterial;
        window.renderInventario = renderInventario;
        window.toggleVoz = toggleVoz;
        
        // ==================== INICIAR ====================
        iniciarSincronizacion();
        if(!API_KEY) abrirModalAPI();
    </script>
</body>
</html>
