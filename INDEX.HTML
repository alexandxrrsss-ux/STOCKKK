<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HerreriaPRO</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root {
            --bg: #1a1a1a;
            --card: #252525;
            --border: #333;
            --orange: #f97316;
            --text: #e0e0e0;
            --text2: #888;
            --danger: #ef4444;
            --success: #10b981;
            --font-sm: clamp(0.65rem, 1.5vw, 0.8rem);
            --font-md: clamp(0.75rem, 1.8vw, 0.9rem);
            --font-lg: clamp(0.9rem, 2.2vw, 1.2rem);
            --font-xl: clamp(1.2rem, 3vw, 1.6rem);
            --sidebar-w: 60px;
            --topbar-h: 50px;
        }
        
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', system-ui, -apple-system, sans-serif}
        body{
            background:var(--bg);color:var(--text);height:100vh;height:100dvh;
            display:flex;overflow:hidden;-webkit-tap-highlight-color:transparent;
            touch-action:manipulation;
        }
        
        /* === BOTTOM NAV (MÓVIL) === */
        .bottom-nav{
            display:none;
            position:fixed;bottom:0;left:0;right:0;background:#111;
            border-top:2px solid var(--border);z-index:100;
            padding:0.3rem 0 env(safe-area-inset-bottom, 0.5rem);
        }
        .bottom-nav-inner{display:flex;justify-content:space-around}
        .bottom-nav .bn-item{
            display:flex;flex-direction:column;align-items:center;gap:0.2rem;
            padding:0.4rem;color:#999;cursor:pointer;font-size:0.6rem;
            border-radius:8px;transition:0.2s;border:none;background:none;
        }
        .bottom-nav .bn-item.active{color:var(--orange);font-weight:700}
        .bottom-nav .bn-item .bn-icon{font-size:1.3rem}
        
        /* === SIDEBAR (ESCRITORIO) === */
        .sidebar{
            width:var(--sidebar-w);background:#111;padding:0.8rem 0.3rem;
            display:flex;flex-direction:column;gap:0.3rem;border-right:2px solid var(--border);
            flex-shrink:0;align-items:center;transition:0.3s;
        }
        .logo{font-size:1rem;font-weight:800;color:var(--orange);text-align:center;margin-bottom:1rem;display:none}
        .sidebar .nav-item{
            padding:0.6rem;border-radius:10px;cursor:pointer;color:#999;
            font-size:0.65rem;text-align:center;display:flex;flex-direction:column;
            align-items:center;gap:0.2rem;transition:0.2s;width:100%;
        }
        .sidebar .nav-item .nav-icon{font-size:1.2rem}
        .sidebar .nav-item.active{background:var(--orange);color:#000;font-weight:700}
        .sidebar .nav-item:active{transform:scale(0.95)}
        
        /* === MAIN === */
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .topbar{
            background:#111;padding:0 1rem;height:var(--topbar-h);
            border-bottom:2px solid var(--border);display:flex;
            justify-content:space-between;align-items:center;flex-shrink:0;
        }
        .topbar h1{font-size:var(--font-lg);color:var(--orange);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .topbar-right{display:flex;align-items:center;gap:0.5rem;flex-shrink:0}
        .status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .status-dot.on{background:var(--success);box-shadow:0 0 5px var(--success)}
        .status-dot.off{background:var(--danger)}
        .content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0.8rem;-webkit-overflow-scrolling:touch}
        
        .page{display:none;animation:fadeIn 0.2s}
        .page.active{display:block}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        
        /* === CARDS === */
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:0.5rem;margin-bottom:1rem}
        .stat-card{
            background:var(--card);border:1px solid var(--border);border-radius:10px;
            padding:0.8rem;text-align:center;transition:0.2s;
        }
        .stat-card:active{transform:scale(0.97);background:#333}
        .stat-card .num{font-size:var(--font-xl);font-weight:800;color:var(--orange)}
        .stat-card .lbl{font-size:0.6rem;color:var(--text2);text-transform:uppercase;margin-top:0.2rem}
        
        .alert-list{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.8rem}
        .alert-list h3{color:var(--orange);margin-bottom:0.5rem;font-size:var(--font-md)}
        .alert-item{
            display:flex;justify-content:space-between;align-items:center;
            padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:var(--font-sm);
            gap:0.5rem;flex-wrap:wrap;
        }
        .badge{padding:0.2rem 0.4rem;border-radius:10px;font-size:0.6rem;font-weight:700;white-space:nowrap}
        .badge.warn{background:#7c2d12;color:#fdba74}
        .badge.danger{background:#450a0a;color:#fca5a5}
        .badge.ok{background:#065f46;color:#6ee7b7}
        .badge.info{background:#1a3a5c;color:#93c5fd}
        
        /* === TABLAS SCROLLEABLES === */
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;background:var(--card);border:1px solid var(--border)}
        table{width:100%;min-width:500px;border-collapse:collapse;font-size:var(--font-sm)}
        th{background:#0a0a0a;color:var(--orange);font-size:0.6rem;text-transform:uppercase;padding:0.5rem;text-align:left;position:sticky;top:0}
        td{padding:0.5rem;border-bottom:1px solid var(--border);white-space:nowrap}
        td:nth-child(1){white-space:normal;min-width:120px}
        tr:active td{background:#333}
        
        /* === BOTONES === */
        .btn{
            background:var(--orange);color:#000;border:none;padding:0.5rem 0.8rem;
            border-radius:8px;font-weight:700;cursor:pointer;font-size:var(--font-sm);
            transition:0.2s;white-space:nowrap;min-height:36px;
        }
        .btn:active{transform:scale(0.95);background:#fb923c}
        .btn-outline{
            background:transparent;border:1px solid var(--orange);color:var(--orange);
            padding:0.5rem 0.8rem;border-radius:8px;cursor:pointer;font-size:var(--font-sm);
            white-space:nowrap;min-height:36px;
        }
        .btn-outline:active{background:var(--orange);color:#000}
        .btn-sm{padding:0.3rem 0.5rem;font-size:0.65rem;min-height:28px}
        .btn-icon{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
        
        .btn-voice{
            background:var(--success);color:#fff;border:none;padding:0.4rem 0.8rem;
            border-radius:8px;font-weight:700;cursor:pointer;font-size:var(--font-sm);
            min-height:36px;animation:pulse 2s infinite;
        }
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.4)}70%{box-shadow:0 0 0 8px rgba(16,185,129,0)}}
        .btn-voice.listening{background:var(--danger);animation:none}
        
        /* === INVENTARIO HEADER === */
        .inv-header{display:flex;gap:0.4rem;margin-bottom:0.8rem;flex-wrap:wrap}
        .inv-header input{flex:1;padding:0.5rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:var(--font-md);min-width:120px}
        .inv-header select{padding:0.5rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:var(--font-sm)}
        
        /* === ASISTENTE === */
        .asistente-layout{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;height:calc(100vh - var(--topbar-h) - 3rem);height:calc(100dvh - var(--topbar-h) - 3rem)}
        .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden}
        .panel h3{
            color:var(--orange);padding:0.6rem 0.8rem;border-bottom:1px solid var(--border);
            font-size:var(--font-md);display:flex;justify-content:space-between;align-items:center;
            flex-shrink:0;
        }
        .panel-body{flex:1;overflow-y:auto;padding:0.6rem;-webkit-overflow-scrolling:touch}
        .camera-area{display:flex;flex-direction:column;align-items:center;gap:0.4rem}
        .camera-area img,.camera-area video{
            max-height:150px;width:100%;border-radius:8px;object-fit:contain;background:#000;
        }
        .placeholder{color:var(--text2);text-align:center;padding:1.5rem;font-size:var(--font-sm)}
        
        .chat-msgs{display:flex;flex-direction:column;gap:0.4rem}
        .msg{padding:0.5rem;border-radius:8px;font-size:var(--font-sm);line-height:1.4;max-width:90%}
        .msg.user{background:var(--orange);color:#000;align-self:flex-end}
        .msg.ai{background:#333;color:var(--text);align-self:flex-start;border-left:3px solid var(--orange);white-space:pre-wrap}
        .msg.sys{background:#1a2a1a;color:#6ee7b7;align-self:center;font-size:0.7rem;text-align:center}
        .msg.action{background:#1a3a5c;color:#93c5fd;align-self:center;font-size:0.7rem;border:1px solid #3b82f6}
        
        .chat-input{display:flex;gap:0.3rem;padding:0.5rem;border-top:1px solid var(--border);flex-shrink:0}
        .chat-input input{flex:1;padding:0.5rem;background:#0a0a0a;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:var(--font-md);min-width:0}
        .quick-row{display:flex;gap:0.3rem;flex-wrap:wrap;padding:0 0.5rem 0.3rem;flex-shrink:0}
        
        .config-bar{
            background:var(--card);border:2px solid var(--orange);border-radius:10px;
            padding:0.6rem;margin-bottom:0.5rem;display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap;
        }
        .config-bar.hidden{display:none}
        .config-bar input{flex:1;padding:0.5rem;background:#0a0a0a;border:1px solid var(--border);border-radius:6px;color:#fff;font-family:monospace;font-size:0.8rem;min-width:150px}
        
        /* === MODAL 3D === */
        .modal-overlay{
            position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;
            background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;
            z-index:1000;visibility:hidden;opacity:0;transition:0.2s;
        }
        .modal-overlay.active{visibility:visible;opacity:1}
        .modal{
            background:var(--card);border:2px solid var(--border);border-radius:12px;
            width:95vw;height:85vh;height:85dvh;display:flex;flex-direction:column;overflow:hidden;
        }
        .modal-body{display:flex;flex:1;overflow:hidden}
        .modal-left{
            width:300px;min-width:280px;background:#1a1a1a;padding:1rem;
            overflow-y:auto;border-right:2px solid var(--border);-webkit-overflow-scrolling:touch;
        }
        .modal-left h2{font-size:var(--font-lg);margin-bottom:0.8rem;color:var(--orange)}
        .modal-right{flex:1;position:relative;background:#d4cfc4;min-height:200px}
        #three-container{width:100%;height:100%;cursor:grab;touch-action:pan-x pan-y pinch-zoom}
        #three-container:active{cursor:grabbing}
        .info-overlay{position:absolute;top:10px;left:10px;z-index:10;display:flex;flex-direction:column;gap:0.3rem}
        .cat-badge{background:var(--orange);color:#000;padding:0.3rem 0.7rem;border-radius:6px;font-weight:800;font-size:0.8rem}
        .med-badge{background:rgba(0,0,0,0.7);color:#fff;padding:0.2rem 0.6rem;border-radius:6px;font-size:0.7rem}
        .controls-help{position:absolute;bottom:10px;left:10px;color:#555;font-size:0.6rem;z-index:10;background:rgba(255,255,255,0.8);padding:0.2rem 0.5rem;border-radius:4px}
        .view-btns{position:absolute;bottom:10px;right:10px;display:flex;gap:0.2rem;z-index:10}
        .view-btn{background:rgba(0,0,0,0.6);border:1px solid #666;color:#fff;padding:0.3rem 0.5rem;border-radius:4px;cursor:pointer;font-size:0.6rem}
        
        .form-group{margin-bottom:0.6rem}
        .form-group label{display:block;color:var(--text2);font-size:0.7rem;margin-bottom:0.15rem;font-weight:600}
        .form-group input,.form-group select{width:100%;padding:0.5rem;background:#0a0a0a;border:1px solid var(--border);border-radius:6px;color:#fff;font-size:var(--font-sm)}
        .dim-row{display:grid;grid-template-columns:1fr 1fr;gap:0.3rem}
        .acabado-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.3rem}
        .acabado-btn{
            padding:0.4rem;border-radius:6px;border:2px solid var(--border);background:#0a0a0a;
            color:#999;cursor:pointer;text-align:center;font-size:0.65rem;font-weight:600;transition:0.2s;
        }
        .acabado-btn.activo{border-color:var(--orange);color:var(--orange);background:#2a1a0a}
        .form-actions{display:flex;gap:0.4rem;margin-top:0.8rem}
        
        /* === RESPONSIVE === */
        @media(min-width:1024px){
            :root{--sidebar-w:180px}
            .sidebar{padding:1rem 0.5rem;align-items:stretch}
            .logo{display:block;font-size:1.3rem}
            .sidebar .nav-item{flex-direction:row;font-size:0.8rem;padding:0.7rem;text-align:left}
            .sidebar .nav-item .nav-icon{font-size:1rem}
            .bottom-nav{display:none!important}
        }
        
        @media(max-width:1023px){
            .sidebar{display:none}
            .bottom-nav{display:block}
            .content{padding-bottom:80px}
            .asistente-layout{grid-template-columns:1fr;height:auto;min-height:60vh}
            .modal-left{width:100%!important;min-width:100%!important;max-height:40%}
            .modal-body{flex-direction:column}
            .modal{width:100vw;height:100vh;height:100dvh;border-radius:0}
        }
        
        @media(max-width:480px){
            .stats-grid{grid-template-columns:repeat(2,1fr)}
            .topbar h1{font-size:0.9rem}
            .btn,.btn-outline{font-size:0.7rem;padding:0.4rem 0.6rem;min-height:32px}
            .inv-header{flex-direction:column}
            .inv-header input{width:100%}
            .camera-area img,.camera-area video{max-height:120px}
        }
    </style>
</head>
<body>
    <!-- SIDEBAR DESKTOP -->
    <div class="sidebar" id="sidebar">
        <div class="logo">⚒️ HP</div>
        <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span><span class="nav-text">Dashboard</span></div>
        <div class="nav-item" data-page="inventario"><span class="nav-icon">📦</span><span class="nav-text">Inventario</span></div>
        <div class="nav-item" data-page="asistente"><span class="nav-icon">🤖</span><span class="nav-text">Asistente</span></div>
    </div>
    
    <div class="main">
        <div class="topbar">
            <h1 id="pageTitle">📊 Dashboard</h1>
            <div class="topbar-right">
                <span style="font-size:0.65rem;color:var(--text2);display:none" class="status-label" id="statusText">IA: Off</span>
                <span class="status-dot off" id="statusDot"></span>
                <button class="btn-sm btn-outline" onclick="toggleConfig()" style="font-size:0.6rem">🔑</button>
            </div>
        </div>
        
        <div class="config-bar hidden" id="configBar">
            <input type="password" id="apiKeyInput" placeholder="API Key Groq (gsk_...)">
            <button class="btn btn-sm" onclick="guardarKey()">✓</button>
        </div>
        
        <div class="content">
            <div class="page active" id="page-dashboard">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="alert-list" id="alertList"></div>
            </div>
            
            <div class="page" id="page-inventario">
                <div class="inv-header">
                    <input type="text" id="searchInv" placeholder="🔍 Buscar..." oninput="renderInventario()">
                    <select id="filtroCat" onchange="renderInventario()"><option>Todos</option></select>
                    <button class="btn btn-sm" onclick="abrirModal3D()">➕</button>
                </div>
                <div class="table-wrap"><table id="tablaInventario"></table></div>
            </div>
            
            <div class="page" id="page-asistente">
                <div class="asistente-layout">
                    <div class="panel">
                        <h3>📸 Captura</h3>
                        <div class="panel-body">
                            <div class="camera-area">
                                <video id="cameraPreview" autoplay playsinline style="display:none"></video>
                                <img id="previewImage" alt="Preview" style="display:none">
                                <canvas id="photoCanvas" style="display:none"></canvas>
                                <div class="placeholder" id="camPlaceholder">📷 Toma o sube foto</div>
                                <div style="display:flex;gap:0.3rem;flex-wrap:wrap;justify-content:center">
                                    <button class="btn btn-sm" onclick="abrirCamara()">📸</button>
                                    <button class="btn-outline btn-sm" onclick="document.getElementById('fileInput').click()">📁</button>
                                    <button class="btn btn-sm" id="btnAnalizar" onclick="analizarFoto()" disabled>🔍</button>
                                    <button class="btn-outline btn-sm" id="btnCapturar" onclick="capturarFoto()" style="display:none">📷</button>
                                </div>
                                <input type="file" id="fileInput" accept="image/*" style="display:none">
                            </div>
                        </div>
                    </div>
                    <div class="panel">
                        <h3>💬 Asistente <button class="btn-voice btn-sm" id="btnVoice" onclick="toggleVoz()">🎤</button></h3>
                        <div class="panel-body"><div class="chat-msgs" id="chatMessages">
                            <div class="msg ai">👋 <b>¡Hola!</b> Puedo gestionar tu inventario:<br>• "Usé 5 PTR 2×2"<br>• "Agrega 10 láminas"<br>• "¿Cuánto PTR queda?"</div>
                        </div></div>
                        <div class="quick-row">
                            <button class="btn-outline btn-sm" onclick="preguntar('Usé 3 PTR 2×2')">📦 Usar</button>
                            <button class="btn-outline btn-sm" onclick="preguntar('Agrega 20 varillas 3/8')">➕ Agregar</button>
                            <button class="btn-outline btn-sm" onclick="preguntar('¿Cuánto stock hay?')">📋 Stock</button>
                        </div>
                        <div class="chat-input">
                            <input type="text" id="preguntaInput" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter')preguntar()">
                            <button class="btn btn-sm btn-icon" onclick="preguntar()">➤</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- BOTTOM NAV MOBILE -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="bottom-nav-inner">
            <button class="bn-item active" data-page="dashboard"><span class="bn-icon">📊</span>Inicio</button>
            <button class="bn-item" data-page="inventario"><span class="bn-icon">📦</span>Inventario</button>
            <button class="bn-item" data-page="asistente"><span class="bn-icon">🤖</span>Asistente</button>
        </div>
    </nav>
    
    <!-- MODAL 3D -->
    <div class="modal-overlay" id="modalMaterial">
        <div class="modal">
            <div class="modal-body">
                <div class="modal-left">
                    <h2 id="modalTitle">Material</h2>
                    <div class="form-group"><label>Tipo</label><select id="catSelect" onchange="cambioCategoria()"><option value="PTR">🟫 PTR</option><option value="Redondo">🔴 Tubo Cédula</option><option value="Tubo Ligero">🪈 Tubo Ligero</option><option value="Lámina">📄 Lámina</option><option value="Varilla">〰️ Varilla</option><option value="Flecha">🔩 Flecha</option><option value="Angular">📐 Angular</option><option value="Electrodo">⚡ Electrodo</option></select></div>
                    <div class="form-group"><label>Nombre</label><input type="text" id="nombreInput" placeholder="Nombre"></div>
                    <div id="dimensionesContainer"></div>
                    <div class="form-group"><label>Acabado</label><div class="acabado-grid"><div class="acabado-btn activo" data-acabado="inox">✨ Inox</div><div class="acabado-btn" data-acabado="carbon">🔩 Carbón</div><div class="acabado-btn" data-acabado="galvanizado">🔧 Galv</div><div class="acabado-btn" data-acabado="negro">🖤 Negro</div></div></div>
                    <div class="dim-row"><div class="form-group"><label>Cant</label><input type="number" id="cantidadInput" value="0"></div><div class="form-group"><label>Unidad</label><input type="text" id="unidadInput" value="pza"></div></div>
                    <div class="form-group"><label>Stock Mín</label><input type="number" id="minInput" value="5"></div>
                    <div class="form-group"><label>Notas</label><input type="text" id="notasInput" placeholder="Calibre..."></div>
                    <input type="hidden" id="editId">
                    <div class="form-actions">
                        <button class="btn-outline btn-sm" onclick="closeModal3D()">✕</button>
                        <button class="btn btn-sm" onclick="guardarMaterial()">💾</button>
                    </div>
                </div>
                <div class="modal-right">
                    <div id="three-container">
                        <div class="info-overlay"><span class="cat-badge" id="catLabel3D">PTR</span><span class="med-badge" id="medLabel3D">2"×2"×6m</span></div>
                        <div class="controls-help">Desliza: girar | Pellizca: zoom</div>
                        <div class="view-btns">
                            <button class="view-btn" onclick="resetView()">🔄</button>
                            <button class="view-btn" onclick="viewFront()">📷</button>
                            <button class="view-btn" onclick="viewTop()">📐</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ==================== DATOS ====================
        let materiales = [
            {id:1,categoria:'PTR',nombre:'PTR 2×2 cal 14',cantidad:45,unidad:'pza',min:10,acabado:'inox',notas:'',medidas:{ladoA:0.0508,ladoB:0.0508,espesor:0.0019,largo:6}},

        function initThree() {
            const c = document.getElementById('three-container');

            threeCamera = new THREE.PerspectiveCamera(50,c.clientWidth/c.clientHeight,0.1,50); 
            threeCamera.position.set(2.5,1.8,4);
            threeRenderer = new THREE.WebGLRenderer({antialias:true,powerPreference:'low-power'});
            threeRenderer.setSize(c.clientWidth,c.clientHeight);
            threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
            threeRenderer.shadowMap.enabled = false; // Apagar sombras para mejor rendimiento en móvil
            c.appendChild(threeRenderer.domElement);

            threeControls.enableDamping=true; threeControls.dampingFactor=0.08;
            threeControls.target.set(0,0.3,0);
            threeControls.touches = {ONE:THREE.TOUCH.ROTATE,TWO:THREE.TOUCH.DOLLY_PAN};
            threeScene.add(new THREE.AmbientLight(0xffffff,0.8));

            const f = new THREE.Mesh(new THREE.PlaneGeometry(15,15),new THREE.MeshStandardMaterial({color:0xc8c0b0,roughness:0.8}));
            f.rotation.x=-Math.PI/2; f.position.y=-1; threeScene.add(f);
            const g = new THREE.GridHelper(6,20,0x999999,0xcccccc); g.position.y=-0.99; threeScene.add(g);
            animate3D();
            
            // Redimensionar cuando gira el dispositivo
            new ResizeObserver(()=>{

                    threeCamera.aspect=c.clientWidth/c.clientHeight;

                    threeRenderer.setSize(c.clientWidth,c.clientHeight);

        function animate3D(){requestAnimationFrame(animate3D);if(threeControls)threeControls.update();if(threeRenderer&&threeScene&&threeCamera)threeRenderer.render(threeScene,threeCamera);}

        function crearGeometria(cat,med,acabado){
            const mat=getMaterial(acabado);let geo;
            switch(cat){
                case'Lámina':geo=new THREE.BoxGeometry(med.espesor,med.largo,med.ancho);break;
                case'PTR':geo=new THREE.BoxGeometry(med.ladoA,med.ladoB,med.largo||6);break;
                case'Redondo':case'Tubo Ligero':geo=new THREE.CylinderGeometry(med.diametro/2,med.diametro/2,med.largo||6,24);break;
                case'Varilla':geo=new THREE.CylinderGeometry(med.diametro/2,med.diametro/2,med.largo||12,24);break;
                case'Flecha':geo=new THREE.CylinderGeometry(med.diametro/2,med.diametro/2,med.largo||12,8);break;
                case'Angular':const s=new THREE.Shape();s.moveTo(0,0);s.lineTo(med.alaA,0);s.lineTo(med.alaA,med.espesor);s.lineTo(med.espesor,med.espesor);s.lineTo(med.espesor,med.alaB);s.lineTo(0,med.alaB);s.closePath();geo=new THREE.ExtrudeGeometry(s,{steps:1,depth:med.largo||6,bevelEnabled:true,bevelThickness:0.001,bevelSize:0.001});geo.translate(-med.alaA/2,-med.alaB/2,-(med.largo||6)/2);break;
                case'Electrodo':geo=new THREE.CylinderGeometry(med.diametro/2,med.diametro/2,med.largo||0.35,12);break;
                default:geo=new THREE.BoxGeometry(0.1,0.1,0.1);
            }
            return new THREE.Mesh(geo,mat);
        }
        
        function update3D(){

            const box=new THREE.Box3().setFromObject(currentMesh),size=box.getSize(new THREE.Vector3()).length();
            threeControls.target.copy(box.getCenter(new THREE.Vector3()));threeControls.update();
        }
        
        function obtenerMedidas3D(){
            const cat=document.getElementById('catSelect')?.value||'PTR',m={};
            const g=(id,d)=>+(document.getElementById(id)?.value||d);
            if(cat==='Lámina'){m.largo=g('dimLargo',2.44);m.ancho=g('dimAncho',1.22);m.espesor=g('dimEspesor',0.003)}
            else if(cat==='PTR'){m.ladoA=g('dimLadoA',0.0508);m.ladoB=g('dimLadoB',0.0508);m.espesor=g('dimEspesor',0.0019);m.largo=g('dimLargo',6)}
            else if(cat==='Redondo'||cat==='Tubo Ligero'){m.diametro=g('dimDiametro',0.0483);m.espesor=g('dimEspesor',0.0012);m.largo=g('dimLargo',6)}
            else if(cat==='Varilla'){m.diametro=g('dimDiametro',0.0095);m.largo=g('dimLargo',12)}
            else if(cat==='Flecha'){m.diametro=g('dimDiametro',0.0127);m.largo=g('dimLargo',12)}
            else if(cat==='Angular'){m.alaA=g('dimAlaA',0.0254);m.alaB=g('dimAlaB',0.0254);m.espesor=g('dimEspesor',0.003175);m.largo=g('dimLargo',6)}
            else if(cat==='Electrodo'){m.diametro=g('dimDiametro',0.0032);m.largo=g('dimLargo',0.35)}
            return m;
        }
        
        function formatearMedidas(cat,m){
            if(cat==='Lámina')return`${m.largo?.toFixed(2)}m × ${m.ancho?.toFixed(2)}m`;
            if(cat==='PTR')return`${(m.ladoA*39.37)?.toFixed(1)}"×${(m.ladoB*39.37)?.toFixed(1)}"×${m.largo?.toFixed(1)}m`;
            if(cat==='Redondo'||cat==='Tubo Ligero')return`Ø${(m.diametro*39.37)?.toFixed(1)}"×${m.largo?.toFixed(1)}m`;
            if(cat==='Varilla'||cat==='Flecha')return`Ø${(m.diametro*1000)?.toFixed(1)}mm×${m.largo?.toFixed(1)}m`;
            if(cat==='Angular')return`${(m.alaA*39.37)?.toFixed(1)}"×${(m.alaB*39.37)?.toFixed(1)}"×${m.largo?.toFixed(1)}m`;
            if(cat==='Electrodo')return`Ø${(m.diametro*1000)?.toFixed(1)}mm×${(m.largo*100)?.toFixed(0)}cm`;
            return'';
        }

        window.preguntar=async function(txt){
            const inp=document.getElementById('preguntaInput');
            const p=txt||inp.value.trim();
            if(!p||!API_KEY)return;
            agregarMsg('user',p);if(!txt)inp.value='';agregarMsg('sys','💭...');
            const invStr=materiales.map(m=>`ID:${m.id}|${m.nombre}|Stock:${m.cantidad}${m.unidad}`).join('\n');
            const prompt=`Eres ASISTENTE DE INVENTARIO de herrería. Si el usuario dice que USÓ/AGREGÓ/QUITÓ materiales, responde SOLO con JSON: {"accion":"usar","items":[{"id":1,"cantidad":3}],"respuesta":"OK"} o {"accion":"agregar","items":[{"id":5,"cantidad":20}],"respuesta":"OK"}. Si pregunta por stock: {"accion":"pregunta","respuesta":"..."}. Si es pregunta técnica, responde normal.\n\nINVENTARIO:\n${invStr}\n\nUSUARIO: "${p}"`;
            try{
                const resp=await llamarIA(prompt,null);
                quitarCargando();
                try{
                    const json=JSON.parse(resp);
                    if(json.accion==='usar'||json.accion==='agregar'){
                        for(let item of json.items){
                            const m=materiales.find(m=>m.id===item.id);
                            if(m){m.cantidad=json.accion==='usar'?Math.max(0,m.cantidad-item.cantidad):m.cantidad+item.cantidad;}
                        }
                        agregarMsg('action',json.respuesta||'✅ Inventario actualizado');
                        renderDashboard();if(paginaActual==='inventario')renderInventario();
                    }else{agregarMsg('ai',json.respuesta||resp);}
                }catch(e){agregarMsg('ai',resp);detectarCambiosLocales(p);}
            }catch(e){quitarCargando();agregarMsg('sys','❌ '+e.message);detectarCambiosLocales(p);}
        };
        
        function detectarCambiosLocales(texto){
            const t=texto.toLowerCase();let cambios=[];
            const patrones=[
                {regex:/us[ée]\s+(\d+)\s+(ptr\s*2|ptr\s*1|lamina|varilla|angular|electrodo|flecha|tubo)/i,accion:'usar'},
                {regex:/quita\s+(\d+)\s+(ptr\s*2|ptr\s*1|lamina|varilla|angular|electrodo|flecha|tubo)/i,accion:'usar'},
                {regex:/agrega\s+(\d+)\s+(ptr\s*2|ptr\s*1|lamina|varilla|angular|electrodo|flecha|tubo)/i,accion:'agregar'},
            ];
            for(let p of patrones){
                const match=texto.match(p.regex);
                if(match){
                    const cantidad=parseInt(match[1]),buscar=match[2];
                    const m=materiales.find(m=>m.nombre.toLowerCase().includes(buscar)||buscar.includes(m.nombre.toLowerCase().substring(0,8)));
                    if(m){m.cantidad=p.accion==='usar'?Math.max(0,m.cantidad-cantidad):m.cantidad+cantidad;cambios.push(`${p.accion==='usar'?'➖':'➕'} ${m.nombre}: ${m.cantidad}`);break;}
                }
            }
            if(cambios.length>0){agregarMsg('action',cambios.join('\n'));renderDashboard();if(paginaActual==='inventario')renderInventario();}
        }
        
        async function llamarIA(prompt,img){
            const msgs=[];
            if(img)msgs.push({role:"user",content:[{type:"text",text:prompt},{type:"image_url",image_url:{url:img}}]});
            else msgs.push({role:"user",content:prompt});
            const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':`Bearer ${API_KEY}`,'Content-Type':'application/json'},body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',messages:msgs,max_tokens:1500,temperature:0.3})});
            if(!r.ok)throw new Error((await r.json().catch(()=>({})))?.error?.message||'Error');
            return (await r.json()).choices[0].message.content;
        }
        
        function agregarMsg(tipo,txt){const c=document.getElementById('chatMessages'),d=document.createElement('div');d.className='msg '+tipo;d.innerHTML=txt;c.appendChild(d);d.scrollIntoView({behavior:'smooth'});}
        function quitarCargando(){const msgs=document.getElementById('chatMessages').children;for(let m of msgs)if(m.textContent.includes('💭')||m.textContent.includes('🔍')){m.remove();break;}}
        
        // ==================== VOZ ====================
        window.toggleVoz=function(){
            const btn=document.getElementById('btnVoice');
            const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
            if(!SR)return alert('Usa Chrome para voz');
            if(!recognition){
                recognition=new SR();recognition.lang='es-MX';recognition.continuous=false;
                recognition.onresult=e=>{document.getElementById('preguntaInput').value=e.results[0][0].transcript;btn.classList.remove('listening');btn.textContent='🎤';escuchando=false;preguntar();};
                recognition.onerror=()=>{btn.classList.remove('listening');btn.textContent='🎤';escuchando=false;};
                recognition.onend=()=>{btn.classList.remove('listening');btn.textContent='🎤';escuchando=false;};
            }
            if(escuchando){recognition.stop();btn.classList.remove('listening');btn.textContent='🎤';escuchando=false;}
            else{recognition.start();btn.classList.add('listening');btn.textContent='🔴';escuchando=true;}
        };
        
        renderDashboard();
    </script>
</body>
</html>
